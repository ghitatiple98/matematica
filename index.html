<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matematică Tiple</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>

    <style>
        :root {
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text-mut: #94a3b8;
            --border: #334155;
        }

        body {
            font-family: 'Segoe UI', Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            background-image: linear-gradient(to bottom, rgba(15, 23, 42, 0.95), rgba(15, 23, 42, 0.98)), 
                              url('https://images.unsplash.com/photo-1635070041078-e363dbe005cb?q=80&w=1200&auto=format&fit=crop');
            background-size: cover;
            background-attachment: fixed;
            color: var(--text);
            margin: 0;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        header { text-align: center; margin-bottom: 30px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        header h1 { margin: 0; color: var(--primary); font-size: 2.5rem; }
        header p { color: var(--text-mut); margin-top: 5px; }

        .container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
        }

        @media (min-width: 1000px) {
            body.mod-admin .container { grid-template-columns: 420px 1fr; }
            body.mod-vizitator .container { grid-template-columns: 1fr; }
        }

        /* Ascundere totală pentru vizitatori */
        body.mod-vizitator .zona-admin {
            display: none !important;
        }

        .nav-tabs {
            display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; background: #0f172a; padding: 6px; border-radius: 8px; border: 1px solid var(--border);
        }

        .tab-btn {
            flex: 1; min-width: 100px; padding: 12px; background: none; border: none; color: var(--text-mut); font-weight: bold; cursor: pointer; border-radius: 6px; transition: all 0.2s;
        }

        .tab-btn.active { background: var(--primary); color: white; box-shadow: 0 0 12px rgba(59, 130, 246, 0.5); }

        .panou-adaugare, .zona-continut, .panou-setari {
            background: var(--card-bg); padding: 25px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); border: 1px solid var(--border); height: fit-content; margin-bottom: 25px;
        }

        h2 { margin-top: 0; font-size: 1.4rem; color: #60a5fa; border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 15px; }

        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 0.9rem; color: #cbd5e1; }
        input, textarea, select {
            width: 100%; padding: 11px; background: #0f172a; color: white; border: 1px solid var(--border); border-radius: 6px; box-sizing: border-box; font-size: 1rem; font-family: inherit;
        }
        input:focus, textarea:focus, select:focus { border-color: var(--primary); outline: none; }
        textarea { height: 90px; resize: vertical; }

        button.btn-block {
            width: 100%; background: var(--primary); color: white; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: background 0.2s;
        }
        button.btn-block:hover { background: var(--primary-hover); }
        button:disabled { background: #475569 !important; cursor: not-allowed; opacity: 0.6; }

        .card { background: #1e293b; border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 20px; position: relative; }
        .badge { display: inline-block; background: #1e3a8a; color: #93c5fd; padding: 4px 10px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; margin-bottom: 12px; border: 1px solid #2563eb; }
        .btn-actiune { background: #059669; color: white; border: none; padding: 9px 18px; border-radius: 4px; cursor: pointer; margin-top: 15px; font-weight: bold; }
        .btn-actiune:hover { background: #047857; }
        
        .btn-sterge { position: absolute; top: 15px; right: 15px; background: #ef4444; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
        .btn-sterge:hover { background: #b91c1c; }
        .ascuns { display: none; margin-top: 15px; padding: 15px; background: #0f172a; border-left: 4px solid #059669; border-radius: 4px; }

        .grila-optiuni { display: flex; flex-direction: column; gap: 8px; margin-top: 15px; }
        .optiune-atacabila { padding: 12px; background: #0f172a; border: 1px solid var(--border); border-radius: 6px; cursor: pointer; transition: all 0.2s; }
        .optiune-atacabila:hover { background-color: #334155; }
        .optiune-corecta { background-color: #065f46 !important; border-color: #10b981 !important; color: white; font-weight: bold; }
        .optiune-gresita { background-color: #991b1b !important; border-color: #ef4444 !important; color: white; }
        
        .feedback-test { margin-top: 15px; padding: 12px; border-radius: 6px; display: none; font-size: 0.95rem; }
        .scor-box { background: #0f172a; padding: 12px; border-radius: 8px; font-weight: bold; text-align: center; margin-bottom: 15px; color: #60a5fa; border: 1px solid var(--border); }

        .lista-categorii-setari { list-style: none; padding: 0; margin: 15px 0 0 0; }
        .lista-categorii-setari li { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: #0f172a; margin-bottom: 5px; border-radius: 4px; border: 1px solid var(--border); font-size: 0.9rem; }
        .btn-mic-sterge { background: #ef4444; border: none; color: white; padding: 4px 8px; border-radius: 3px; cursor: pointer; font-size: 0.75rem; }
        
        #status-incarcare { background: #1e3a8a; color: #93c5fd; padding: 10px; border-radius: 6px; text-align: center; margin-bottom: 15px; font-weight: bold; font-size: 0.9rem; border: 1px solid #2563eb;}
        #banner-admin { background: #16a34a; color: white; padding: 6px; text-align: center; font-size: 0.85rem; font-weight: bold; margin-bottom: 15px; border-radius: 4px; border: 1px solid #15803d; display: none; }
    </style>
</head>
<body class="mod-vizitator">

    <header>
        <h1> MATEMATICĂ by Țiple</h1>
        <p id="subtitlu-pagina">Platformă de studiu și testare online</p>
    </header>

    <div id="banner-admin">🛠️ CONECTAT CA ADMINISTRATOR — Panoul de adăugare este activ.</div>
    <div id="status-incarcare">🔄 Se conectează la baza de date...</div>

    <div class="container">
        <div class="zona-admin">
            <div class="panou-adaugare">
                <h2>Adaugă Element Nou</h2>
                <form id="mainForm">
                    <div class="form-group">
                        <label for="sectiune">Alege Categoria Principală</label>
                        <select id="sectiune" onchange="ajusteazaFormular()"></select>
                    </div>

                    <div class="form-group">
                        <label id="label-titlu" for="titlu">Titlu</label>
                        <input type="text" id="titlu" placeholder="Introduceți titlul..." required>
                    </div>

                    <div class="form-group">
                        <label for="subcategorie">Subcategorie / Clasă</label>
                        <input type="text" id="subcategorie" placeholder="Ex: Algebră - Clasa a IX-a" required>
                    </div>

                    <div class="form-group">
                        <label id="label-continut" for="continut">Conținut</label>
                        <textarea id="continut" placeholder="Scrieți textul aici..." required></textarea>
                    </div>

                    <div id="zona-clasica-raspuns" class="form-group">
                        <label id="label-raspuns" for="raspuns">Rezolvare Detaliată</label>
                        <textarea id="raspuns" placeholder="Pașii de rezolvare..."></textarea>
                    </div>

                    <div id="zona-grila" style="display: none;">
                        <label>Variante de răspuns:</label>
                        <div class="form-group"><input type="text" id="optA" placeholder="Varianta A"></div>
                        <div class="form-group"><input type="text" id="optB" placeholder="Varianta B"></div>
                        <div class="form-group"><input type="text" id="optC" placeholder="Varianta C"></div>
                        <div class="form-group"><input type="text" id="optD" placeholder="Varianta D"></div>
                        
                        <div class="form-group">
                            <label for="raspunsCorectGrila">Care este varianta corectă?</label>
                            <select id="raspunsCorectGrila">
                                <option value="A">Varianta A</option>
                                <option value="B">Varianta B</option>
                                <option value="C">Varianta C</option>
                                <option value="D">Varianta D</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="explicatieGrila">Explicație / Indicație (Opțional)</label>
                            <textarea id="explicatieGrila" placeholder="Apare după ce utilizatorul răspunde..."></textarea>
                        </div>
                    </div>

                    <button type="submit" id="btn-salveaza" class="btn-block" disabled>Se încarcă...</button>
                </form>
            </div>

            <div class="panou-setari">
                <h2>⚙️ Panou Control: Categorii noi</h2>
                <div class="form-group">
                    <label for="nouaCategorieNume">Nume Categorie Nouă</label>
                    <input type="text" id="nouaCategorieNume" placeholder="Ex: Variante BAC">
                </div>
                <div class="form-group">
                    <label for="nouaCategorieTip">Tipul de conținut</label>
                    <select id="nouaCategorieTip">
                        <option value="teorie">📘 Tip Teorie</option>
                        <option value="probleme">📝 Tip Problemă</option>
                        <option value="teste">⏱️ Tip Test Grilă</option>
                    </select>
                </div>
                <button type="button" id="btn-creeaza-cat" onclick="adaugaCategorieNoua()" class="btn-block" style="background:#4b5563;" disabled>Așteaptă...</button>
                
                <label style="margin-top:20px;">Categoriile tale active:</label>
                <ul id="lista-categorii-setari" class="lista-categorii-setari"></ul>
            </div>
        </div>

        <div class="zona-continut">
            <div class="nav-tabs" id="container-butoane-meniu"></div>

            <div id="scor-container" class="scor-box" style="display: none;">
                Scor curent: <span id="puncte-corecte">0</span> din <span id="total-teste">0</span> întrebări încercate
            </div>

            <div id="afisaj-materiale"></div>
        </div>
    </div>

    <script>
        const CLOUD_URL = 'https://kvdb.io/6gZ2k922nZ6Y2K964A8U8M/mate_hub_data';
        
        // AICI ESTE VALOAREA SECRETĂ. Doar dacă link-ul conține exact asta, vei fi Admin!
        const CHEIE_SECRETA = 'FocAtestat2026!'; 

        let categorii = [];
        let database = [];
        let tabCurent = ""; 
        let scorCorect = 0;
        let intrebariRespondente = 0;
        let esteAdmin = false;

        const form = document.getElementById('mainForm');
        const container = document.getElementById('afisaj-materiale');
        const statusBox = document.getElementById('status-incarcare');
        const btnSalveaza = document.getElementById('btn-salveaza');
        const btnCat = document.getElementById('btn-creeaza-cat');

        function verificaRolUtilizator() {
            const parametriiLink = new URLSearchParams(window.location.search);
            if (parametriiLink.get('cheie') === CHEIE_SECRETA) {
                esteAdmin = true;
                document.body.classList.remove('mod-vizitator');
                document.body.classList.add('mod-admin');
                document.getElementById('banner-admin').style.display = 'block';
                document.getElementById('subtitlu-pagina').innerText = "Panou Administrativ de Gestionare";
            }
        }

        async function incarcaDateDinCloud() {
            try {
                const raspuns = await fetch(CLOUD_URL);
                if (raspuns.status === 200) {
                    const dateServer = await raspuns.json();
                    categorii = dateServer.categorii || [
                        { id: "teorie", nume: "📘 Teorie", tip: "teorie" },
                        { id: "probleme", nume: "📝 Probleme", tip: "probleme" },
                        { id: "teste", nume: "⏱️ Teste Grilă", tip: "teste" }
                    ];
                    database = dateServer.database || [];
                    tabCurent = categorii.length > 0 ? categorii[0].id : '';
                }
                
                statusBox.style.backgroundColor = "#065f46";
                statusBox.style.color = "#34d399";
                statusBox.style.borderColor = "#10b981";
                statusBox.innerText = "✅ Platformă sincronizată online.";

                btnSalveaza.disabled = false;
                btnSalveaza.innerText = "Salvează pe Site (Global)";
                btnCat.disabled = false;
                btnCat.innerText = "Creează Categorie";

                construiesteMeniuri();
                ajusteazaFormular();
                afiseazaDate();
            } catch (eroare) {
                statusBox.innerText = "❌ Eroare la descărcarea datelor.";
            }
        }

        async function salveazaInCloud() {
            // Blocaj de siguranță: Dacă cineva forțează codul fără cheia corectă, browserul nu va trimite nimic spre cloud!
            if (!esteAdmin) { 
                alert("Acțiune interzisă! Nu aveți cheia de acces."); 
                return; 
            }

            try {
                statusBox.style.backgroundColor = "#1e3a8a";
                statusBox.style.color = "#93c5fd";
                statusBox.innerText = "🔄 Se salvează modificările în Cloud...";
                
                await fetch(CLOUD_URL, {
                    method: 'POST',
                    body: JSON.stringify({ categorii: categorii, database: database }),
                    headers: { 'Content-Type': 'application/json' }
                });
                
                statusBox.style.backgroundColor = "#065f46";
                statusBox.style.color = "#34d399";
                statusBox.innerText = "✅ Modificările tale au fost salvate și publicate global!";
            } catch (e) {
                statusBox.innerText = "⚠️ Eroare tehnică la salvare!";
            }
        }

        function construiesteMeniuri() {
            const containerMeniu = document.getElementById('container-butoane-meniu');
            const selectFormular = document.getElementById('sectiune');
            const listaSetari = document.getElementById('lista-categorii-setari');

            containerMeniu.innerHTML = '';
            selectFormular.innerHTML = '';
            listaSetari.innerHTML = '';

            categorii.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = `tab-btn ${cat.id === tabCurent ? 'active' : ''}`;
                btn.innerText = cat.nume;
                btn.onclick = () => schimbaTab(cat.id, btn);
                containerMeniu.appendChild(btn);

                if (esteAdmin) {
                    const opt = document.createElement('option');
                    opt.value = cat.id;
                    opt.innerText = cat.nume;
                    selectFormular.appendChild(opt);

                    const li = document.createElement('li');
                    li.innerHTML = `
                        <span><strong>${cat.nume}</strong></span>
                        <button class="btn-mic-sterge" onclick="stergeCategorie('${cat.id}')">Șterge</button>
                    `;
                    listaSetari.appendChild(li);
                }
            });
        }

        function adaugaCategorieNoua() {
            if (!esteAdmin) return;
            const numeInput = document.getElementById('nouaCategorieNume');
            const tipSelect = document.getElementById('nouaCategorieTip');
            const nume = numeInput.value.trim();
            const tip = tipSelect.value;

            if(!nume) return;
            const id = nume.toLowerCase().replace(/[^a-z0-9]/g, '');

            categorii.push({ id: id, nume: nume, tip: tip });
            numeInput.value = '';
            tabCurent = id;
            
            construiesteMeniuri();
            schimbaTab(tabCurent, null);
            salveazaInCloud();
        }

        function stergeCategorie(id) {
            if (!esteAdmin) return;
            if(confirm("Ștergi această categorie?")) {
                database = database.filter(item => item.sectiune !== id);
                categorii = categorii.filter(c => c.id !== id);
                tabCurent = categorii.length > 0 ? categorii[0].id : '';
                construiesteMeniuri();
                schimbaTab(tabCurent, null);
                salveazaInCloud();
            }
        }

        function ajusteazaFormular() {
            if (!esteAdmin) return;
            const catId = document.getElementById('sectiune').value;
            if(!catId) return;
            const categorieGasita = categorii.find(c => c.id === catId);
            if (!categorieGasita) return;

            const tip = categorieGasita.tip;
            const zonaClasica = document.getElementById('zona-clasica-raspuns');
            const zonaGrila = document.getElementById('zona-grila');

            if (tip === 'teorie') {
                document.getElementById('label-titlu').innerText = "Titlu Lecție";
                document.getElementById('label-continut').innerText = "Conținut Teorie";
                zonaClasica.style.display = 'none';
                zonaGrila.style.display = 'none';
            } else if (tip === 'probleme') {
                document.getElementById('label-titlu').innerText = "Titlu Problemă";
                document.getElementById('label-continut').innerText = "Enunț Problemă";
                document.getElementById('label-raspuns').innerText = "Rezolvare Detaliată";
                zonaClasica.style.display = 'block';
                zonaGrila.style.display = 'none';
            } else if (tip === 'teste') {
                document.getElementById('label-titlu').innerText = "Întrebare Test";
                document.getElementById('label-continut').innerText = "Enunț / Cerință Întrebare";
                zonaClasica.style.display = 'none';
                zonaGrila.style.display = 'block';
            }
        }

        function schimbaTab(tabId, element) {
            tabCurent = tabId;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            if(element) element.classList.add('active');
            
            const categorieActiva = categorii.find(c => c.id === tabCurent);
            const esteTipTest = categorieActiva && categorieActiva.tip === 'teste';

            document.getElementById('scor-container').style.display = esteTipTest ? 'block' : 'none';
            if(esteTipTest) resetScor();
            afiseazaDate();
        }

        function resetScor() {
            scorCorect = 0;
            intrebariRespondente = 0;
            document.getElementById('puncte-corecte').innerText = scorCorect;
            document.getElementById('total-teste').innerText = intrebariRespondente;
        }

        function afiseazaDate() {
            container.innerHTML = '';
            if(!tabCurent) return;

            const elementeFiltrate = database.filter(item => item.sectiune === tabCurent);
            const categorieActiva = categorii.find(c => c.id === tabCurent);
            const tipCurent = categorieActiva ? categorieActiva.tip : 'teorie';

            if (elementeFiltrate.length === 0) {
                container.innerHTML = `<p style="color: var(--text-mut); text-align: center; padding: 20px;">Secțiune goală.</p>`;
                return;
            }

            elementeFiltrate.forEach((item) => {
                const realIndex = database.indexOf(item); 
                const card = document.createElement('div');
                card.className = 'card';
                
                let butonStergeAdmin = esteAdmin ? `<button class="btn-sterge" onclick="stergeElement(${realIndex})">Șterge</button>` : '';

                let continutCard = `
                    ${butonStergeAdmin}
                    <span class="badge">${item.subcategorie}</span>
                    <h3 style="margin: 5px 0 12px 0; color:#93c5fd;">${item.titlu}</h3>
                    <div style="line-height:1.6;">${item.continut.replace(/\n/g, '<br>')}</div>
                `;

                if (tipCurent === 'probleme') {
                    continutCard += `
                        <button class="btn-actiune" onclick="toggleCasuta(${realIndex})">Vezi Rezolvarea</button>
                        <div id="box-${realIndex}" class="ascuns">
                            <strong style="color:#10b981;">Rezolvare:</strong><br><p>${item.raspuns.replace(/\n/g, '<br>')}</p>
                        </div>
                    `;
                } else if (tipCurent === 'teste') {
                    continutCard += `
                        <div class="grila-optiuni" id="grila-container-${realIndex}">
                            <div class="optiune-atacabila" onclick="verificaRaspuns(this, '${realIndex}', 'A')"><strong>A:</strong> ${item.optA}</div>
                            <div class="optiune-atacabila" onclick="verificaRaspuns(this, '${realIndex}', 'B')"><strong>B:</strong> ${item.optB}</div>
                            <div class="optiune-atacabila" onclick="verificaRaspuns(this, '${realIndex}', 'C')"><strong>C:</strong> ${item.optC}</div>
                            <div class="optiune-atacabila" onclick="verificaRaspuns(this, '${realIndex}', 'D')"><strong>D:</strong> ${item.optD}</div>
                        </div>
                        <div id="feedback-${realIndex}" class="feedback-test"></div>
                    `;
                }

                card.innerHTML = continutCard;
                container.appendChild(card);
            });

            renderMathInElement(document.body, {
                delimiters: [
                    {left: '$$', right: '$$', display: true},
                    {left: '$', right: '$', display: false}
                ],
                throwOnError: false
            });
        }

        function verificaRaspuns(elementSelectat, indexReal, literaAleasa) {
            const item = database[indexReal];
            const containerGrila = document.getElementById(`grila-container-${indexReal}`);
            const feedbackBox = document.getElementById(`feedback-${indexReal}`);
            if (containerGrila.classList.contains('respondent')) return;
            containerGrila.classList.add('respondent');

            intrebariRespondente++;
            document.getElementById('total-teste').innerText = intrebariRespondente;
            const copii = containerGrila.children;
            let indexCorect = ['A', 'B', 'C', 'D'].indexOf(item.raspunsCorectGrila);

            if (literaAleasa === item.raspunsCorectGrila) {
                elementSelectat.classList.add('optiune-corecta');
                scorCorect++;
                document.getElementById('puncte-corecte').innerText = scorCorect;
                feedbackBox.style.display = "block";
                feedbackBox.style.backgroundColor = "rgba(16, 185, 129, 0.15)";
                feedbackBox.style.color = "#34d399";
                feedbackBox.style.border = "1px solid #10b981";
                feedbackBox.innerHTML = "<strong>🌟 Corect!</strong> " + (item.explicatieGrila ? item.explicatieGrila : "");
            } else {
                elementSelectat.classList.add('optiune-gresita');
                copii[indexCorect].classList.add('optiune-corecta');
                feedbackBox.style.display = "block";
                feedbackBox.style.backgroundColor = "rgba(239, 68, 68, 0.15)";
                feedbackBox.style.color = "#f87171";
                feedbackBox.style.border = "1px solid #ef4444";
                feedbackBox.innerHTML = `<strong>❌ Greșit.</strong> Răspunsul corect era varianta <strong>${item.raspunsCorectGrila}</strong>.<br>${item.explicatieGrila ? '<em>Explicație:</em> ' + item.explicatieGrila : ''}`;
            }
            renderMathInElement(feedbackBox, { delimiters: [{left: '$', right: '$', display: false}] });
        }

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            if (!esteAdmin) return;

            const sectiuneAleasa = document.getElementById('sectiune').value;
            if(!sectiuneAleasa) return;
            const categorieActiva = categorii.find(c => c.id === sectiuneAleasa);

            let nouMaterial = {
                sectiune: sectiuneAleasa,
                titlu: document.getElementById('titlu').value,
                subcategorie: document.getElementById('subcategorie').value,
                continut: document.getElementById('continut').value
            };

            if (categorieActiva.tip === 'teste') {
                nouMaterial.optA = document.getElementById('optA').value;
                nouMaterial.optB = document.getElementById('optB').value;
                nouMaterial.optC = document.getElementById('optC').value;
                nouMaterial.optD = document.getElementById('optD').value;
                nouMaterial.raspunsCorectGrila = document.getElementById('raspunsCorectGrila').value;
                nouMaterial.explicatieGrila = document.getElementById('explicatieGrila').value;
            } else {
                nouMaterial.raspuns = document.getElementById('raspuns').value;
            }

            database.push(nouMaterial);
            form.reset();
            schimbaTab(sectiuneAleasa, null);
            salveazaInCloud();
        });

        function toggleCasuta(index) {
            const box = document.getElementById(`box-${index}`);
            box.style.display = (box.style.display === 'block') ? 'none' : 'block';
        }

        function stergeElement(index) {
            if (!esteAdmin) return;
            if(confirm("Ștergi definitiv acest material?")) {
                database.splice(index, 1);
                afiseazaDate();
                salveazaInCloud();
            }
        }

        window.onload = () => {
            verificaRolUtilizator();
            incarcaDateDinCloud();
        };
    </script>
</body>
</html>
